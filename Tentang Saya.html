<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tentang Saya</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* posisinya agak ke atas */
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2, #fcb69f); /* gradasi lembut */
    }

    /* Tombol kembali */
    .back-btn {
      margin: 20px;
      align-self: flex-start;
    }

    .back-btn a {
      text-decoration: none;
      background: linear-gradient(45deg, #ff6a00, #ee0979);
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.4s ease, transform 0.3s ease, box-shadow 0.3s ease;
      display: inline-block;
    }

    .back-btn a:hover {
      background: linear-gradient(45deg, #ee0979, #ff6a00); /* gradasi hover 🔥 */
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    /* Kotak konten */
    .container {
      max-width: 700px;
      width: 90%;
      background: rgba(255, 255, 255, 0.9);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      text-align: center;
      margin-top: 10px; /* biar tidak terlalu ke bawah */
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 15px;
      color: #333;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      text-align: justify;
      text-indent: 25px; /* paragraf menjorok */
      color: #444;
    }

    /* Responsif tablet */
    @media (max-width: 768px) {
      h1 {
        font-size: 1.6rem;
      }
      p {
        font-size: 0.95rem;
      }
    }

    /* Responsif HP */
    @media (max-width: 480px) {
      .back-btn a {
        font-size: 0.85rem;
        padding: 8px 14px;
      }
      h1 {
        font-size: 1.4rem;
      }
      p {
        font-size: 0.9rem;
        text-indent: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Tombol kembali -->
  <div class="back-btn">
    <a href="index.html">← Kembali</a>
  </div>

  <!-- Konten utama -->
  <div class="container">
    <h1>Kehidupan Pribadi Atmin</h1>
    <p>
      Qumara Rezky Fadilla, atau bisa dipanggil Kumar lahir pada tanggal 3 Agustus 2009 di Sleman, Jogjakarta. 
      Sekarang sedang menempuh jenjang pendidikan di SMKN 10 Semarang dengan memilih jurusan Rekayasa Perangkat Lunak.
    </p>
  </div>
</body>
</html>
