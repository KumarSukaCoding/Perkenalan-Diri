<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tentang Saya</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2, #fcb69f); /* gradasi lembut */
    }

    .container {
      max-width: 700px;
      width: 90%;
      background: rgba(255, 255, 255, 0.9);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 15px;
      color: #333;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      text-align: justify;
      text-indent: 25px; /* paragraf menjorok */
      color: #444;
    }

    /* Responsif tablet */
    @media (max-width: 768px) {
      h1 {
        font-size: 1.6rem;
      }
      p {
        font-size: 0.95rem;
      }
    }

    /* Responsif HP */
    @media (max-width: 480px) {
      h1 {
        font-size: 1.4rem;
      }
      p {
        font-size: 0.9rem;
        text-indent: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Kehidupan Pribadi Atmin</h1>
    <p>
      Qumara Rezky Fadilla, atau bisa dipanggil Kumar lahir pada tanggal 3 Agustus 2009 di Sleman, Jogjakarta. 
      Sekarang sedang menempuh jenjang pendidikan di SMKN 10 Semarang dengan memilih jurusan Rekayasa Perangkat Lunak.
    </p>
  </div>
</body>
</html>
